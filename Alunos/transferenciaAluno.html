<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transferência de Polo - Plataforma Libertar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body no-scroll"> 
    <div class="wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-logo-area">
                <img src="../assets/img/libertar-logo.jpg" alt="Logo Libertar">
            </div>

            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Início</a></li>
                
                <li class="dropdown-hover">
                    <a href="javascript:void(0)" class="active">
                        <i class="bi bi-people-fill"></i> Alunos
                    </a>
                    <ul class="submenu" style="max-height: 250px;">
                        <li><a href="novoAluno.html"><i class="bi bi-plus-lg"></i> Novo Aluno</a></li>
                        <li><a href="consultaAluno.html"><i class="bi bi-search"></i> Localizar Aluno</a></li>
                        <li><a href="transferenciaAluno.html" style="font-weight: bold; color: var(--side-logo-bg) !important;"><i class="bi bi-arrow-left-right"></i> Transferência de Polo</a></li>
                    </ul>
                </li>

                <li><a href="../presenca.html"><i class="bi bi-calendar-check-fill"></i> Presença</a></li>
                
                <li class="dropdown-hover">
                    <a href="javascript:void(0)">
                        <i class="bi bi-gear-fill"></i> Administração
                    </a>
                    <ul class="submenu">
                        <li><a href="../Administração/cadastroPolo.html"><i class="bi bi-building-add"></i> Novo Polo</a></li>
                        <li><a href="../Administração/cadastroUsuario.html"><i class="bi bi-person-add"></i> Novo Usuário</a></li>
                    </ul>
                </li>
                
                <li class="mt-auto"><a href="../index.html" class="logout-link"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <h1 class="user-greeting">TRANSFERÊNCIA DE POLO</h1>

            <div class="dash-card d-flex flex-column justify-content-between">
                
                <form class="custom-form flex-grow-1">
                    
                    <h5 style="color: var(--side-logo-bg); font-weight: bold; text-transform: uppercase; margin-bottom: 15px; font-size: 1rem;">1. Selecionar Aluno</h5>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Buscar (Matrícula ou CPF)</label>
                            <div class="d-flex gap-2">
                                <input type="text" class="form-control dash-input" placeholder="Digite para buscar...">
                                <button type="button" class="btn btn-salvar px-3" style="height: 38px;"><i class="bi bi-search"></i></button>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Aluno Selecionado</label>
                            <input type="text" class="form-control dash-input" value="Nenhum aluno selecionado..." disabled>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Polo Atual</label>
                            <input type="text" class="form-control dash-input" value="-" disabled>
                        </div>
                    </div>

                    <hr style="border-top: 1px solid rgba(89, 84, 79, 0.2); margin-bottom: 20px;">

                    <h5 style="color: var(--side-logo-bg); font-weight: bold; text-transform: uppercase; margin-bottom: 15px; font-size: 1rem;">2. Dados da Transferência</h5>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Novo Polo <span class="text-danger">*</span></label>
                            <select class="form-select dash-input">
                                <option selected disabled>Selecione a unidade de destino...</option>
                                <option>Polo Central</option>
                                <option>Polo Norte</option>
                                <option>Polo Sul</option>
                                <option>Polo Leste</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Nova Turma <span class="text-danger">*</span></label>
                            <select class="form-select dash-input">
                                <option selected disabled>Selecione a turma no novo polo...</option>
                                <option>Turma A - Manhã</option>
                                <option>Turma B - Tarde</option>
                                <option>Turma C - Noite</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-12">
                            <label class="form-label">Justificativa da Transferência <span class="text-danger">*</span></label>
                            <textarea class="form-control dash-input" rows="4" placeholder="Descreva o motivo detalhado para a transferência de unidade deste aluno..." style="resize: none;"></textarea>
                        </div>
                    </div>

                </form>

                <div class="d-flex justify-content-end gap-3 mt-auto pt-3" style="border-top: 1px solid rgba(89, 84, 79, 0.2);">
                    <button type="button" class="btn btn-cancelar">Cancelar</button>
                    <button type="button" class="btn btn-salvar">Efetuar Transferência</button>
                </div>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
