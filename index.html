<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plataforma Libertar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>

    <div class="container-fluid vh-100 p-0">
        <div class="row g-0 h-100">
            
            <div class="col-md-6 d-none d-md-block login-image-side">
                </div>

            <div class="col-md-6 login-form-side d-flex flex-column">
                
                <div class="color-stripe"></div>

                <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 px-4">
                    
                    <div class="mb-5 text-center d-flex justify-content-center">
                        <img src="assets/img/libertar-logo.jpg" alt="Logo Libertar pela Educação" class="img-fluid" style="max-width: 350px;">
                    </div>

                    <h2 class="text-white mb-4 fw-light" style="font-size: 2rem; letter-spacing: 2px;">LOGIN</h2>

                    <form id="form-login" class="w-100" style="max-width: 380px;">
                        
                        <div class="mb-3">
                            <label class="text-white mb-1 small">E-mail</label>
                            <input type="email" id="email-login" class="form-control login-input" placeholder="Digite seu e-mail" required>
                        </div>

                        <div class="mb-3">
                            <label class="text-white mb-1 small">Senha</label>
                            <input type="password" id="senha-login" class="form-control login-input" placeholder="Digite sua senha" required>
                        </div>

                        <div class="mb-5 text-start">
                           <a href="#" class="forgot-password-link" data-bs-toggle="modal" data-bs-target="#modalEsqueciSenha">Esqueceu a senha?</a>
                        </div>

                        <button type="submit" class="btn btn-login w-100 py-3 fw-bold">ENTRAR</button>
                    </form>

                    <div class="text-center mt-5" style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6); max-width: 380px;">
                        <p class="mb-3" style="font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: var(--side-logo-bg);">Precisa de ajuda com seu acesso?</p>
                        <div class="d-flex flex-column gap-2 align-items-center">
                            <span><i class="bi bi-envelope-fill me-2"></i> libertarpelaeducacao@gmail.com</span>
                            <span><i class="bi bi-whatsapp me-2"></i> (11) 97190-3898</span>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="modalEsqueciSenha" tabindex="-1" aria-hidden="true" data-bs-backdrop="false">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: #2b2b2b; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-white fw-bold">Redefinir Senha</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body">
                    <p class="text-white-50 mb-3 small">Digite o e-mail cadastrado na sua conta para receber o link de recuperação seguro.</p>
                    <input type="email" id="email-recuperacao" class="form-control login-input" placeholder="Digite seu e-mail...">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btn-enviar-recuperacao" class="btn btn-salvar px-4">Enviar Link</button>
                </div>
            </div>
        </div>
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
