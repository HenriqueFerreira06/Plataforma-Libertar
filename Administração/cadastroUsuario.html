        <main class="main-content">
            
            <h1 class="user-greeting">CADASTRAR USUÁRIO</h1>

            <div class="dash-card d-flex flex-column justify-content-between">
                
                <form id="form-novo-usuario" class="custom-form flex-grow-1 d-flex flex-column">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Nome Completo <span class="text-danger">*</span></label>
                            <input type="text" id="nome-usuario" class="form-control dash-input" placeholder="Nome do funcionário/professor" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CPF <span class="text-danger">*</span></label>
                            <input type="text" id="cpf-usuario" class="form-control dash-input" placeholder="000.000.000-00" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">E-mail <span class="text-danger">*</span></label>
                            <input type="email" id="email-usuario" class="form-control dash-input" placeholder="exemplo@gmail.com" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Cargo / Função <span class="text-danger">*</span></label>
                            <input type="text" id="cargo-usuario" class="form-control dash-input" placeholder="Ex: Professor" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Celular</label>
                            <input type="tel" id="celular-usuario" class="form-control dash-input" placeholder="(00) 00000-0000">
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                           <label class="form-label">Nível de Acesso <span class="text-danger">*</span></label>
                            <select id="acesso-usuario" class="form-select dash-input" required>
                                <option value="" selected disabled>Selecione a permissão...</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Professor">Professor</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Polo Vinculado <span class="text-danger">*</span></label>
                            <select id="polo-usuario" class="form-select dash-input dynamic-polo-select" required>
                                <option value="" selected disabled>Carregando polos...</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Senha Inicial <span class="text-danger">*</span></label>
                            <input type="password" id="senha-usuario" class="form-control dash-input" placeholder="Defina uma senha de acesso" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-auto pt-3" style="border-top: 1px solid rgba(89, 84, 79, 0.2);">
                        <button type="reset" class="btn btn-cancelar">Cancelar</button>
                        <button type="submit" id="btn-salvar-usuario" class="btn btn-salvar">Salvar Usuário</button>
                    </div>

                </form>

            </div>

        </main>
