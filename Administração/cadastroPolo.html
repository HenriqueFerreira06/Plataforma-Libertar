<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body no-scroll"> 
    <div class="wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-logo-area">
                <img src="../assets/img/libertar-logo.jpg" alt="Logo Libertar">
            </div>

            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Início</a></li>
                
                <li class="dropdown-hover prof-admin-only">
                    <a href="javascript:void(0)"><i class="bi bi-people-fill"></i> Alunos</a>
                    <ul class="submenu">
                        <li class="admin-only"><a href="../Alunos/novoAluno.html"><i class="bi bi-plus-lg"></i> Novo Aluno</a></li>
                        <li class="prof-admin-only"><a href="../Alunos/consultaAluno.html"><i class="bi bi-search"></i> Localizar Aluno</a></li>
                    </ul>
                </li>

                <li class="prof-only"><a href="../presenca.html"><i class="bi bi-calendar-check-fill"></i> Presença</a></li>

                <li class="dropdown-hover admin-only">
                    <a href="javascript:void(0)" class="active">
                        <i class="bi bi-gear-fill"></i> Administração
                    </a>
                    <ul class="submenu" style="max-height: 250px;">
                        <li><a href="cadastroPolo.html" style="font-weight: bold; color: var(--side-logo-bg) !important;"><i class="bi bi-building-add"></i> Novo Polo</a></li>
                        <li><a href="cadastroUsuario.html"><i class="bi bi-person-add"></i> Novo Usuário</a></li>
                        <li><a href="consultaUsuario.html"><i class="bi bi-search"></i> Consultar Usuários</a></li>
                    </ul>
                </li>
                
                <li class="mt-auto"><a href="../index.html" class="logout-link"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <h1 class="user-greeting">CADASTRAR POLO</h1>

            <div class="dash-card d-flex flex-column justify-content-between">
                
                <form id="form-novo-polo" class="custom-form flex-grow-1 d-flex flex-column">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-8">
                            <label class="form-label">Nome da Unidade / Polo <span class="text-danger">*</span></label>
                            <input type="text" id="nome-polo" class="form-control dash-input" placeholder="Ex: Polo Zona Sul - SP" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">CNPJ <span class="text-danger">*</span></label>
                            <input type="text" id="cnpj-polo" class="form-control dash-input" placeholder="00.000.000/0000-00" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label">CEP <span class="text-danger">*</span></label>
                            <input type="text" id="cep-polo" class="form-control dash-input" placeholder="00000-000" required>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label">Endereço (Rua, Av.) <span class="text-danger">*</span></label>
                            <input type="text" id="endereco-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Número <span class="text-danger">*</span></label>
                            <input type="text" id="numero-polo" class="form-control dash-input" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Bairro</label>
                            <input type="text" id="bairro-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cidade</label>
                            <input type="text" id="cidade-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Responsável pela Unidade</label>
                            <input type="text" id="responsavel-polo" class="form-control dash-input" placeholder="Nome do coordenador/gestor">
                        </div>
                    </div>

                    <div class="d-flex justify-content-end gap-3 mt-auto pt-3" style="border-top: 1px solid rgba(89, 84, 79, 0.2);">
                        <button type="reset" class="btn btn-cancelar">Cancelar</button>
                        <button type="submit" id="btn-salvar-polo" class="btn btn-salvar">Salvar Polo</button>
                    </div>
                </form>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
