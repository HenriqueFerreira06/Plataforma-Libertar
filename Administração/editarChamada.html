<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Chamada - Plataforma Libertar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body no-scroll"> 
    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-logo-area">
                <img src="../assets/img/libertar-logo.jpg" alt="Logo Libertar">
            </div>
            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Início</a></li>
                <li class="mt-auto text-center" style="font-size: 0.8rem; color: var(--text-light); line-height: 1.6; padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); cursor: default;">
                    <span style="font-weight: bold; color: var(--side-logo-bg); text-transform: uppercase; font-size: 0.75rem;">Suporte Libertar</span><br>
                   <i class="bi bi-envelope"></i> libertarpelaeducacao@gmail.com<br>
        <i class="bi bi-whatsapp"></i> (11) 97190-3898
                </li>
                <li><a href="../index.html" class="logout-link"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="user-greeting mb-0">EDITAR REGISTRO DE CHAMADA</h1>
                <a href="historicoChamadas.html" class="btn btn-cancelar"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>

            <div class="dash-card d-flex flex-column">
                <form id="form-editar-chamada" class="custom-form">
                    <input type="hidden" id="edit-id-chamada">
                    <div class="row g-2 mb-4">
                        <div class="col-md-2">
                            <label class="form-label">Data</label>
                            <input type="date" id="edit-data-chamada" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Polo</label>
                            <input type="text" id="edit-polo-chamada" class="form-control dash-input" readonly>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Turma</label>
                            <input type="text" id="edit-turma-chamada" class="form-control dash-input" readonly>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Professor</label>
                            <input type="text" id="edit-prof-chamada" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Disciplina</label>
                            <input type="text" id="edit-disc-chamada" class="form-control dash-input" required>
                        </div>
                    </div>

                    <div class="table-container mb-4" style="max-height: 40vh; overflow-y: auto; border: 1px solid rgba(89, 84, 79, 0.2);">
                        <table class="custom-table m-0">
                            <thead>
                                <tr>
                                    <th>Matrícula</th>
                                    <th>Nome do Aluno</th>
                                    <th class="text-center">Status de Presença</th>
                                </tr>
                            </thead>
                            <tbody id="tabela-edicao-chamada">
                                </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between pt-3" style="border-top: 1px solid rgba(89, 84, 79, 0.2);">
                        <button type="button" id="btn-excluir-chamada" class="btn btn-danger px-4" style="font-weight: bold;"><i class="bi bi-trash3-fill"></i> Excluir Chamada</button>
                        <button type="submit" class="btn btn-salvar px-5">SALVAR ALTERAÇÕES</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
