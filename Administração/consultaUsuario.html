<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizar Usuário - Plataforma Libertar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body no-scroll"> 
    <div class="wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-logo-area">
                <img src="../assets/img/libertar-logo.jpg" alt="Logo Libertar">
            </div>

            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Início</a></li>
                
                <li class="dropdown-hover">
                    <a href="javascript:void(0)"><i class="bi bi-people-fill"></i> Alunos</a>
                    <ul class="submenu">
                        <li><a href="../Alunos/novoAluno.html"><i class="bi bi-plus-lg"></i> Novo Aluno</a></li>
                        <li><a href="../Alunos/consultaAluno.html"><i class="bi bi-search"></i> Localizar Aluno</a></li>
                    </ul>
                </li>

                <li><a href="../presenca.html"><i class="bi bi-calendar-check-fill"></i> Presença</a></li>
                
                <li class="dropdown-hover">
                    <a href="javascript:void(0)" class="active">
                        <i class="bi bi-gear-fill"></i> Administração
                    </a>
                    <ul class="submenu" style="max-height: 250px;">
                        <li><a href="cadastroPolo.html"><i class="bi bi-building-add"></i> Novo Polo</a></li>
                        <li><a href="cadastroUsuario.html"><i class="bi bi-person-add"></i> Novo Usuário</a></li>
                        <li><a href="consultaUsuario.html" style="font-weight: bold; color: var(--side-logo-bg) !important;"><i class="bi bi-search"></i> Consultar Usuários</a></li>
                    </ul>
                </li>
                
                <li class="mt-auto"><a href="../index.html" class="logout-link"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="user-greeting mb-0">LOCALIZAR USUÁRIOS E FUNCIONÁRIOS</h1>
            </div>

            <div class="dash-card d-flex flex-column h-100" style="max-height: 80vh;">
                
                <div class="row g-2 mb-4">
                    <div class="col-md-3">
                        <input type="text" id="busca-nome-usuario" class="form-control dash-input" placeholder="Buscar por Nome ou CPF...">
                    </div>
                    <div class="col-md-3">
                        <select id="filtro-cargo-usuario" class="form-select dash-input">
                            <option value="todos">Todos os Acessos</option>
                            <option value="Administrador Geral">Administrador Geral</option>
                            <option value="Coordenador de Polo">Coordenador de Polo</option>
                            <option value="Professor">Professor</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filtro-polo-usuario" class="form-select dash-input">
                            <option value="todos">Todos os Polos</option>
                            <option value="Todos os Polos (Global)">Global</option>
                            <option value="Polo Central">Polo Central</option>
                            <option value="Polo Norte">Polo Norte</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select id="filtro-status-usuario" class="form-select dash-input">
                            <option value="todos">Status (Todos)</option>
                            <option value="ativo">Ativos</option>
                            <option value="inativo">Inativos</option>
                        </select>
                    </div>
                </div>

                <div class="table-container flex-grow-1" style="overflow-y: auto; border: 1px solid rgba(89, 84, 79, 0.2);">
                    <table class="custom-table w-100 m-0">
                        <thead>
                            <tr>
                                <th>NOME COMPLETO</th>
                                <th>E-MAIL</th>
                                <th>ACESSO</th>
                                <th>POLO</th>
                                <th>STATUS</th>
                                <th>AÇÕES</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-usuarios">
                            </tbody>
                    </table>
                </div>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
