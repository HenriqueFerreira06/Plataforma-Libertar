<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Polo - Plataforma Libertar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="dashboard-body no-scroll"> 
    <div class="wrapper">
        
        <aside class="sidebar">
            <div class="sidebar-logo-area">
                <img src="../assets/img/libertar-logo.jpg" alt="Logo Libertar">
            </div>

            <ul class="sidebar-menu">
                <li><a href="../dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Início</a></li>
                
                <li class="dropdown-hover prof-admin-only">
                    <a href="javascript:void(0)"><i class="bi bi-people-fill"></i> Alunos</a>
                    <ul class="submenu">
                        <li class="admin-only"><a href="../Alunos/novoAluno.html"><i class="bi bi-plus-lg"></i> Novo Aluno</a></li>
                        <li class="prof-admin-only"><a href="../Alunos/consultaAluno.html"><i class="bi bi-search"></i> Localizar Aluno</a></li>
                    </ul>
                </li>

                <li class="prof-only"><a href="../presenca.html"><i class="bi bi-calendar-check-fill"></i> Presença</a></li>

                <li class="dropdown-hover admin-only">
                    <a href="javascript:void(0)" class="active">
                        <i class="bi bi-gear-fill"></i> Administração
                    </a>
                    <ul class="submenu" style="max-height: 250px;">
                        <li><a href="cadastroPolo.html"><i class="bi bi-building-add"></i> Novo Polo</a></li>
                        <li><a href="cadastroUsuario.html"><i class="bi bi-person-add"></i> Novo Usuário</a></li>
                        <li><a href="consultaUsuario.html"><i class="bi bi-search"></i> Consultar Usuários</a></li>
                        <li><a href="consultaPolo.html" style="font-weight: bold; color: var(--side-logo-bg) !important;"><i class="bi bi-building"></i> Consultar Polos</a></li>
                    </ul>
                </li>
                
                <li class="mt-auto"><a href="../index.html" class="logout-link"><i class="bi bi-box-arrow-left"></i> Sair</a></li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="user-greeting mb-0">EDITAR POLO / UNIDADE</h1>
                <a href="consultaPolo.html" class="btn btn-cancelar"><i class="bi bi-arrow-left"></i> Voltar</a>
            </div>

            <div class="dash-card d-flex flex-column justify-content-between">
                
                <form id="form-editar-polo" class="custom-form flex-grow-1 d-flex flex-column">
                    <input type="hidden" id="edit-id-polo">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-9">
                            <label class="form-label">Nome da Unidade / Polo <span class="text-danger">*</span></label>
                            <input type="text" id="edit-nome-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Status</label>
                            <select id="edit-status-polo" class="form-select dash-input fw-bold" required>
                                <option value="ativo" class="text-success">ATIVO</option>
                                <option value="inativo" class="text-danger">INATIVO</option>
                            </select>
                        </div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-3">
                            <label class="form-label">CEP <span class="text-danger">*</span></label>
                            <input type="text" id="edit-cep-polo" class="form-control dash-input" placeholder="00000-000" required>
                        </div>
                        <div class="col-md-7">
                            <label class="form-label">Endereço (Rua, Av.) <span class="text-danger">*</span></label>
                            <input type="text" id="edit-endereco-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Número <span class="text-danger">*</span></label>
                            <input type="text" id="edit-numero-polo" class="form-control dash-input" required>
                        </div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-4">
                            <label class="form-label">Bairro</label>
                            <input type="text" id="edit-bairro-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Cidade</label>
                            <input type="text" id="edit-cidade-polo" class="form-control dash-input" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Responsável pela Unidade</label>
                            <input type="text" id="edit-responsavel-polo" class="form-control dash-input" placeholder="Nome do coordenador/gestor">
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-auto pt-3" style="border-top: 1px solid rgba(89, 84, 79, 0.2);">
                        <button type="button" id="btn-excluir-polo" class="btn btn-danger px-4" style="border-radius: 0; font-weight: bold;"><i class="bi bi-trash3-fill"></i> Excluir Unidade</button>
                        <button type="submit" id="btn-salvar-edicao-polo" class="btn btn-salvar">Salvar Alterações</button>
                    </div>

                </form>

            </div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/main.js"></script>
</body>
</html>
